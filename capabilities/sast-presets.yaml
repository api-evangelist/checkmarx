naftiko: 1.0.0-alpha2
info:
  label: Checkmarx SAST API — Presets
  description: 'Checkmarx SAST API — Presets. 2 operations. Lead operation: Checkmarx List all scan presets. Self-contained
    Naftiko capability covering one Checkmarx business surface.'
  tags:
  - Checkmarx
  - Presets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHECKMARX_API_KEY: CHECKMARX_API_KEY
capability:
  consumes:
  - type: http
    namespace: sast-presets
    baseUri: https://{checkmarx-server}/cxrestapi
    description: Checkmarx SAST API — Presets business capability. Self-contained, no shared references.
    resources:
    - name: sast-presets
      path: /sast/presets
      operations:
      - name: listpresets
        method: GET
        description: Checkmarx List all scan presets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: sast-presets-presetId
      path: /sast/presets/{presetId}
      operations:
      - name: getpreset
        method: GET
        description: Checkmarx Get preset details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: presetId
          in: path
          type: integer
          description: Preset unique identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.CHECKMARX_API_KEY}}'
  exposes:
  - type: rest
    namespace: sast-presets-rest
    port: 8080
    description: REST adapter for Checkmarx SAST API — Presets. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/sast/presets
      name: sast-presets
      description: REST surface for sast-presets.
      operations:
      - method: GET
        name: listpresets
        description: Checkmarx List all scan presets
        call: sast-presets.listpresets
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sast/presets/{presetid}
      name: sast-presets-presetid
      description: REST surface for sast-presets-presetId.
      operations:
      - method: GET
        name: getpreset
        description: Checkmarx Get preset details
        call: sast-presets.getpreset
        with:
          presetId: rest.presetId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sast-presets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Checkmarx SAST API — Presets. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: checkmarx-list-all-scan-presets
      description: Checkmarx List all scan presets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sast-presets.listpresets
      outputParameters:
      - type: object
        mapping: $.
    - name: checkmarx-get-preset-details
      description: Checkmarx Get preset details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sast-presets.getpreset
      with:
        presetId: tools.presetId
      outputParameters:
      - type: object
        mapping: $.
