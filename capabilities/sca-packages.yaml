naftiko: 1.0.0-alpha2
info:
  label: Checkmarx SCA API — Packages
  description: 'Checkmarx SCA API — Packages. 1 operations. Lead operation: Checkmarx Get package details. Self-contained
    Naftiko capability covering one Checkmarx business surface.'
  tags:
  - Checkmarx
  - Packages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHECKMARX_API_KEY: CHECKMARX_API_KEY
capability:
  consumes:
  - type: http
    namespace: sca-packages
    baseUri: https://api-sca.checkmarx.net
    description: Checkmarx SCA API — Packages business capability. Self-contained, no shared references.
    resources:
    - name: packages-packageType-packageName-version
      path: /packages/{packageType}/{packageName}/{version}
      operations:
      - name: getpackagedetails
        method: GET
        description: Checkmarx Get package details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: packageType
          in: path
          type: string
          description: Package ecosystem type
          required: true
        - name: packageName
          in: path
          type: string
          description: Package name
          required: true
        - name: version
          in: path
          type: string
          description: Package version
          required: true
    authentication:
      type: bearer
      token: '{{env.CHECKMARX_API_KEY}}'
  exposes:
  - type: rest
    namespace: sca-packages-rest
    port: 8080
    description: REST adapter for Checkmarx SCA API — Packages. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/packages/{packagetype}/{packagename}/{version}
      name: packages-packagetype-packagename-version
      description: REST surface for packages-packageType-packageName-version.
      operations:
      - method: GET
        name: getpackagedetails
        description: Checkmarx Get package details
        call: sca-packages.getpackagedetails
        with:
          packageType: rest.packageType
          packageName: rest.packageName
          version: rest.version
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sca-packages-mcp
    port: 9090
    transport: http
    description: MCP adapter for Checkmarx SCA API — Packages. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: checkmarx-get-package-details
      description: Checkmarx Get package details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sca-packages.getpackagedetails
      with:
        packageType: tools.packageType
        packageName: tools.packageName
        version: tools.version
      outputParameters:
      - type: object
        mapping: $.
