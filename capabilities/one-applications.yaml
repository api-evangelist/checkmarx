      outputParameters:
      - type: object
        mapping: $.
    - name: checkmarx-update-application
      description: Checkmarx Update an application
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: one-applications.updateapplication
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: checkmarx-delete-application
